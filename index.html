<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cute Kong">
<title>Cute Kong</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body { height:100%; overflow:hidden; background:#0d0b1f; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; touch-action:none; }
  #wrap { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #stage { position:relative; width:100%; max-width:430px; height:100%; display:flex; flex-direction:column; }
  #topbar { display:flex; justify-content:space-between; align-items:center; padding:calc(env(safe-area-inset-top) + 8px) 16px 8px; color:#fff; font-weight:700; }
  .pill { background:rgba(255,255,255,.12); padding:6px 14px; border-radius:20px; font-size:15px; backdrop-filter:blur(8px); }
  #canvasHolder { flex:1; position:relative; display:flex; align-items:center; justify-content:center; min-height:0; }
  canvas#game { background:#1a1438; border-radius:18px; box-shadow:0 10px 40px rgba(0,0,0,.5); max-height:100%; max-width:100%; }

  #controls { display:flex; justify-content:space-between; align-items:center; gap:12px;
              padding:10px 26px calc(env(safe-area-inset-bottom) + 5vh + 14px); }

  #joystick { position:relative; width:130px; height:130px; border-radius:50%;
              background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.18);
              backdrop-filter:blur(10px); touch-action:none; }
  #stick { position:absolute; left:50%; top:50%; width:62px; height:62px; margin:-31px 0 0 -31px;
           border-radius:50%; background:linear-gradient(160deg,#ffd86b,#ffb347);
           box-shadow:0 4px 16px rgba(0,0,0,.4); transition:transform .04s ease-out; }
  .tick { position:absolute; left:50%; top:50%; font-size:13px; color:rgba(255,255,255,.5); transform-origin:center; }

  #jump { width:90px; height:90px; border-radius:26px; font-size:19px; font-weight:800; letter-spacing:.5px; color:#fff;
          display:flex; align-items:center; justify-content:center; border:none;
          background:linear-gradient(160deg,#ff7eb3,#ff5e62); box-shadow:0 6px 20px rgba(255,94,98,.5);
          transition:transform .05s; touch-action:none; }
  #jump:active, #jump.on { transform:scale(.92); }

  #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
             background:rgba(13,11,31,.82); backdrop-filter:blur(6px); color:#fff; padding:30px; z-index:10; }
  #overlay h1 { font-size:34px; margin-bottom:6px; background:linear-gradient(90deg,#ffd86b,#ff7eb3); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #overlay p { font-size:16px; opacity:.85; margin-bottom:8px; max-width:320px; line-height:1.45; }
  #overlay .big { font-size:64px; margin:6px 0 14px; }
  #startBtn { margin-top:18px; padding:16px 44px; font-size:19px; font-weight:800; color:#1a1438; border:none; border-radius:30px;
              background:linear-gradient(160deg,#ffd86b,#ffb347); box-shadow:0 8px 26px rgba(255,179,71,.5); }
  #startBtn:active { transform:scale(.95); }
  .hint { font-size:13px; opacity:.6; margin-top:22px; }
  #haptic { position:absolute; opacity:0; pointer-events:none; width:0; height:0; }
</style>
</head>
<body>
<div id="wrap"><div id="stage">
  <div id="topbar">
    <div class="pill">❤️ <span id="lives">3</span></div>
    <div class="pill">Level <span id="lvl">1</span>/5</div>
    <div class="pill">⭐ <span id="score">0</span></div>
  </div>

  <div id="canvasHolder">
    <canvas id="game" width="400" height="640"></canvas>
    <div id="overlay">
      <div class="big">🦍</div>
      <h1>Cute Kong</h1>
      <p>The cheeky gorilla has trapped your friend at the top! Climb the ladders, dodge the rolling barrels and rescue them across 5 levels.</p>
      <button id="startBtn">Tap to Play</button>
      <div class="hint">Drag the stick to move & climb &nbsp;•&nbsp; JUMP to hop barrels</div>
    </div>
  </div>

  <div id="controls">
    <div id="joystick">
      <div class="tick" style="transform:translate(-50%,-58px)">▲</div>
      <div class="tick" style="transform:translate(-50%,46px)">▼</div>
      <div class="tick" style="transform:translate(-62px,-50%)">◀</div>
      <div class="tick" style="transform:translate(48px,-50%)">▶</div>
      <div id="stick"></div>
    </div>
    <div id="jump">JUMP</div>
  </div>
</div></div>

<!-- iOS haptic trick element -->
<label id="haptic"><input type="checkbox" switch></label>

<script>
(function(){
  const cv = document.getElementById('game'), ctx = cv.getContext('2d');
  const W = 400, H = 640;
  const $ = id => document.getElementById(id);

  // ---------- Haptics ----------
  const hLabel = $('haptic');
  function buzz(pattern){
    if(navigator.vibrate){ try{ navigator.vibrate(pattern); }catch(e){} }   // Android / supported browsers
    try{ hLabel.click(); }catch(e){}                                        // iOS 17.4+ switch-haptic trick
  }

  // ---------- Home-screen icon (cute Kong, generated at runtime) ----------
  function makeIcon(){
    const c = document.createElement('canvas'); c.width = c.height = 180;
    const x = c.getContext('2d');
    const g = x.createLinearGradient(0,0,0,180); g.addColorStop(0,'#3a2a6e'); g.addColorStop(1,'#1a1438');
    x.fillStyle=g; x.fillRect(0,0,180,180);
    // soft glow
    x.fillStyle='rgba(255,216,107,.18)'; x.beginPath(); x.arc(90,86,72,0,7); x.fill();
    x.save(); x.translate(90,90); x.scale(3.0,3.0);
    // ears
    x.fillStyle='#6b4f3a'; x.beginPath(); x.arc(-22,-2,8,0,7); x.arc(22,-2,8,0,7); x.fill();
    // head
    x.fillStyle='#6b4f3a'; x.beginPath(); x.arc(0,0,23,0,7); x.fill();
    // muzzle
    x.fillStyle='#c9a98a'; x.beginPath(); x.arc(0,7,15,0,Math.PI); x.fill();
    x.beginPath(); x.arc(0,-2,14,0,Math.PI); x.fill();
    // eyes
    x.fillStyle='#fff'; x.beginPath(); x.arc(-8,-5,5.5,0,7); x.arc(8,-5,5.5,0,7); x.fill();
    x.fillStyle='#1a1438'; x.beginPath(); x.arc(-7,-5,2.8,0,7); x.arc(9,-5,2.8,0,7); x.fill();
    // nostrils + grin
    x.fillStyle='#5a3b2a'; x.beginPath(); x.arc(-4,6,1.4,0,7); x.arc(4,6,1.4,0,7); x.fill();
    x.strokeStyle='#3a2a1a'; x.lineWidth=2; x.beginPath(); x.arc(0,9,6,0.12*Math.PI,0.88*Math.PI); x.stroke();
    x.restore();
    const url = c.toDataURL('image/png');
    let link = document.querySelector('link[rel="apple-touch-icon"]');
    if(!link){ link = document.createElement('link'); link.rel='apple-touch-icon'; document.head.appendChild(link); }
    link.href = url;
    let fav = document.createElement('link'); fav.rel='icon'; fav.href=url; document.head.appendChild(fav);
  }

  // ---------- Input ----------
  const keys = { up:false, down:false };
  let moveX = 0, jumpQueued = false, jumpHeld = false;

  const joy = $('joystick'), stick = $('stick');
  const MAX = 45, DEAD = 0.22, CLIMB_TH = 0.42;
  let joyId = null, joyCx = 0, joyCy = 0;
  function setFromVector(dx, dy){
    const dist = Math.hypot(dx, dy); let ddx=dx, ddy=dy;
    if(dist>MAX){ ddx=dx/dist*MAX; ddy=dy/dist*MAX; }
    stick.style.transform = `translate(${ddx}px, ${ddy}px)`;
    const nx=ddx/MAX, ny=ddy/MAX;
    moveX = Math.abs(nx)<DEAD ? 0 : nx;
    keys.up = ny<-CLIMB_TH; keys.down = ny>CLIMB_TH;
  }
  function resetJoy(){ stick.style.transform='translate(0,0)'; moveX=0; keys.up=keys.down=false; }
  joy.addEventListener('touchstart', e=>{ e.preventDefault(); const t=e.changedTouches[0]; const r=joy.getBoundingClientRect();
    joyCx=r.left+r.width/2; joyCy=r.top+r.height/2; joyId=t.identifier; setFromVector(t.clientX-joyCx,t.clientY-joyCy); },{passive:false});
  window.addEventListener('touchmove', e=>{ if(joyId===null) return; for(const t of e.changedTouches){ if(t.identifier===joyId){ e.preventDefault(); setFromVector(t.clientX-joyCx,t.clientY-joyCy); } } },{passive:false});
  function joyEnd(e){ if(joyId===null) return; for(const t of e.changedTouches){ if(t.identifier===joyId){ joyId=null; resetJoy(); } } }
  window.addEventListener('touchend', joyEnd); window.addEventListener('touchcancel', joyEnd);
  let mouseJoy=false;
  joy.addEventListener('mousedown', e=>{ const r=joy.getBoundingClientRect(); joyCx=r.left+r.width/2; joyCy=r.top+r.height/2; mouseJoy=true; setFromVector(e.clientX-joyCx,e.clientY-joyCy); });
  window.addEventListener('mousemove', e=>{ if(mouseJoy) setFromVector(e.clientX-joyCx,e.clientY-joyCy); });
  window.addEventListener('mouseup', ()=>{ if(mouseJoy){ mouseJoy=false; resetJoy(); } });

  const jbtn = $('jump');
  const jOn = e=>{ e.preventDefault(); if(!jumpHeld) jumpQueued=true; jumpHeld=true; jbtn.classList.add('on'); };
  const jOff= e=>{ e.preventDefault(); jumpHeld=false; jbtn.classList.remove('on'); };
  jbtn.addEventListener('touchstart',jOn,{passive:false}); jbtn.addEventListener('touchend',jOff,{passive:false}); jbtn.addEventListener('touchcancel',jOff,{passive:false});
  jbtn.addEventListener('mousedown',jOn); jbtn.addEventListener('mouseup',jOff); jbtn.addEventListener('mouseleave',jOff);

  addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft') moveX=-1; else if(e.key==='ArrowRight') moveX=1;
    else if(e.key==='ArrowUp') keys.up=true; else if(e.key==='ArrowDown') keys.down=true;
    else if(e.key===' '){ if(!jumpHeld) jumpQueued=true; jumpHeld=true; } else return; e.preventDefault();
  });
  addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft'&&moveX<0) moveX=0; else if(e.key==='ArrowRight'&&moveX>0) moveX=0;
    else if(e.key==='ArrowUp') keys.up=false; else if(e.key==='ArrowDown') keys.down=false;
    else if(e.key===' ') jumpHeld=false;
  });

  // ---------- World ----------
  const PLAT = [600, 488, 376, 264, 152];
  const THICK = 16;
  const LADDERS = [ {x:330,i:0},{x:78,i:1},{x:330,i:2},{x:90,i:3} ].map(l=>({x:l.x, top:PLAT[l.i+1], bottom:PLAT[l.i]}));
  const DIR = [1,-1,1,-1,1];
  const THEMES = [
    {sky:'#241a4d', g1:'#3a2a6e', plat:'#ff9a5a', name:'Sunset Site'},
    {sky:'#0f2e3d', g1:'#16465c', plat:'#5ad1c8', name:'Aqua Tower'},
    {sky:'#3d0f2e', g1:'#5c1646', plat:'#ff7eb3', name:'Candy Heights'},
    {sky:'#2e3d0f', g1:'#465c16', plat:'#c8e85a', name:'Jungle Climb'},
    {sky:'#1a1438', g1:'#2a2060', plat:'#ffd86b', name:'Golden Summit'}
  ];

  // ---------- State ----------
  let level=1, lives=3, score=0, state='menu';
  let player, barrels, spawnTimer, theme, anim=0;
  const JUMP_V = 8.8, GRAV = 0.55;   // peak height ≈ 70px  <  floor gap 112px → can never reach the floor above

  function resetPlayer(){ player={ x:30, y:PLAT[0]-30, w:22, h:30, vx:0, vy:0, onGround:true, climbing:false, ladder:null, face:1, walk:0, inv:0 }; }
  function startLevel(){ theme=THEMES[level-1]; barrels=[]; spawnTimer=0; resetPlayer(); state='play'; updateHUD(); }
  function newGame(){ level=1; lives=3; score=0; startLevel(); }
  function updateHUD(){ $('lives').textContent=lives; $('lvl').textContent=level; $('score').textContent=score; }
  function diff(){ return { speed:1.0+level*0.28, interval:Math.max(70,150-level*14), ladderDrop:0.10+level*0.03 }; }
  function spawnBarrel(){ barrels.push({ x:60, y:PLAT[4]-12, r:11, dir:DIR[4], pi:4, vy:0, falling:false, spin:0 }); }

  // ---------- Update ----------
  function update(){
    anim++;
    if(state!=='play') return;
    const d = diff(); const p = player;
    if(p.inv>0) p.inv--;

    // --- begin climbing (smooth, latches onto a ladder) ---
    if(!p.climbing && p.onGround){
      const ccx=p.x+p.w/2, feet=p.y+p.h;
      if(keys.up){
        for(const l of LADDERS){ if(Math.abs(ccx-l.x)<18 && feet>l.top+8 && feet<=l.bottom+4){ p.climbing=true; p.ladder=l; buzz(12); break; } }
      } else if(keys.down){
        for(const l of LADDERS){ if(Math.abs(ccx-l.x)<18 && Math.abs(feet-l.top)<10){ p.climbing=true; p.ladder=l; p.y+=4; buzz(12); break; } }
      }
    }

    if(p.climbing){
      // hold the latched ladder reference so the exit at the top is clean & continuous
      const L = p.ladder;
      p.x = L.x - p.w/2; p.vx=0; p.vy=0;
      if(keys.up){ p.y -= 2.7; p.walk += 0.35; }
      if(keys.down){ p.y += 2.7; p.walk += 0.35; }
      if(jumpQueued){ p.climbing=false; p.ladder=null; p.vy=-JUMP_V; p.onGround=false; buzz(10); }
      else if(p.y + p.h <= L.top){ p.y=L.top-p.h; p.climbing=false; p.ladder=null; p.onGround=true; p.vy=0; }  // smooth top exit
      else if(p.y + p.h >= L.bottom){ p.y=L.bottom-p.h; p.climbing=false; p.ladder=null; p.onGround=true; p.vy=0; }
    } else {
      // horizontal (analog)
      p.vx = 0;
      const mx = moveX;
      if(mx<-0.15){ p.vx=mx*2.6; p.face=-1; } else if(mx>0.15){ p.vx=mx*2.6; p.face=1; }
      if(p.vx!==0 && p.onGround) p.walk += Math.abs(p.vx)*0.1;
      p.x += p.vx;
      if(p.x<2) p.x=2; if(p.x>W-p.w-2) p.x=W-p.w-2;

      if(jumpQueued && p.onGround){ p.vy=-JUMP_V; p.onGround=false; buzz(10); }

      p.vy += GRAV; if(p.vy>13) p.vy=13;
      const prevBottom=p.y+p.h; p.y+=p.vy; const newBottom=p.y+p.h;
      p.onGround=false;
      for(const ty of PLAT){ if(prevBottom<=ty+2 && newBottom>=ty && p.vy>=0){ p.y=ty-p.h; p.vy=0; p.onGround=true; break; } }
      if(p.y+p.h>H){ p.y=H-p.h; p.onGround=true; p.vy=0; }
    }
    jumpQueued=false;

    // reach the top platform → win level
    if(p.onGround && (p.y+p.h)<=PLAT[4]+2){
      score+=500; buzz([0,40,40,40]);
      if(level>=5) state='win'; else { level++; state='levelwin'; }
      updateHUD(); return;
    }

    // barrels
    for(let i=barrels.length-1;i>=0;i--){
      const b=barrels[i]; b.spin+=b.dir*0.2;
      if(b.falling){ b.vy+=0.6; b.y+=b.vy; const ty=PLAT[b.pi]; if(b.y+b.r>=ty){ b.y=ty-b.r; b.vy=0; b.falling=false; } }
      else {
        b.x+=b.dir*d.speed;
        for(const l of LADDERS){ if(l.bottom===PLAT[b.pi] && Math.abs(b.x-l.x)<6 && Math.random()<d.ladderDrop && b.pi>0){ b.falling=true; b.pi-=1; b.vy=2; break; } }
        if(b.x<14 || b.x>W-14){ if(b.pi>0){ b.pi-=1; b.falling=true; b.vy=2; b.dir*=-1; b.x=Math.max(14,Math.min(W-14,b.x)); } else { barrels.splice(i,1); continue; } }
      }
      if(p.inv<=0){
        const dx=(p.x+p.w/2)-b.x, dy=(p.y+p.h/2)-b.y;
        if(Math.abs(dx)<b.r+p.w/2-3 && Math.abs(dy)<b.r+p.h/2-3){ loseLife(); return; }
      }
    }
    spawnTimer++; if(spawnTimer>=d.interval){ spawnTimer=0; spawnBarrel(); }
  }

  function loseLife(){ lives--; updateHUD(); buzz([0,50,40,60]); state = lives<=0 ? 'gameover' : 'dead'; }

  // ---------- Drawing ----------
  function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function drawBackground(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,theme.g1); g.addColorStop(1,theme.sky); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,255,255,.10)'; for(let i=0;i<26;i++){ const sx=((i*97)%W), sy=((i*53)%H); ctx.fillRect(sx,(sy+anim*0.2)%H,2,2); } }
  function drawPlatforms(){ for(const ty of PLAT){ ctx.fillStyle=theme.plat; roundRect(0,ty,W,THICK,6); ctx.fill(); ctx.fillStyle='rgba(0,0,0,.18)';
    for(let x=8;x<W;x+=26){ ctx.beginPath(); ctx.arc(x,ty+THICK/2,2,0,7); ctx.fill(); } ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fillRect(0,ty,W,2); } }
  function drawLadders(){ ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=3;
    for(const l of LADDERS){ ctx.beginPath(); ctx.moveTo(l.x-9,l.top); ctx.lineTo(l.x-9,l.bottom); ctx.moveTo(l.x+9,l.top); ctx.lineTo(l.x+9,l.bottom); ctx.stroke();
      ctx.lineWidth=2.4; for(let y=l.top+8;y<l.bottom;y+=14){ ctx.beginPath(); ctx.moveTo(l.x-9,y); ctx.lineTo(l.x+9,y); ctx.stroke(); } ctx.lineWidth=3; } }
  function drawGorilla(){ const gx=70, gy=PLAT[4]-38, bob=Math.sin(anim*0.08)*2; ctx.save(); ctx.translate(gx,gy+bob);
    ctx.fillStyle='#6b4f3a'; roundRect(-26,-4,52,42,18); ctx.fill(); ctx.fillStyle='#c9a98a'; roundRect(-15,6,30,28,14); ctx.fill();
    ctx.fillStyle='#5b4230'; roundRect(-38,2,16,30,8); ctx.fill(); roundRect(22,-2,16,28,8); ctx.fill();
    ctx.fillStyle='#6b4f3a'; ctx.beginPath(); ctx.arc(0,-20,22,0,7); ctx.fill(); ctx.fillStyle='#c9a98a'; ctx.beginPath(); ctx.arc(0,-14,14,0,Math.PI); ctx.fill();
    ctx.fillStyle='#6b4f3a'; ctx.beginPath(); ctx.arc(-22,-22,7,0,7); ctx.arc(22,-22,7,0,7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-8,-24,5,0,7); ctx.arc(8,-24,5,0,7); ctx.fill();
    ctx.fillStyle='#1a1438'; ctx.beginPath(); ctx.arc(-7,-24,2.5,0,7); ctx.arc(9,-24,2.5,0,7); ctx.fill();
    ctx.strokeStyle='#3a2a1a'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,-10,7,0.1*Math.PI,0.9*Math.PI); ctx.stroke();
    ctx.fillStyle='#b5651d'; roundRect(28,-12,16,18,5); ctx.fill(); ctx.restore();
    const fx=W-50, fy=PLAT[4]-30, fb=Math.sin(anim*0.1)*2; ctx.save(); ctx.translate(fx,fy+fb);
    ctx.fillStyle='#ff7eb3'; roundRect(-12,0,24,28,10); ctx.fill(); ctx.fillStyle='#ffe0c2'; ctx.beginPath(); ctx.arc(0,-6,12,0,7); ctx.fill();
    ctx.fillStyle='#5a3b2a'; ctx.beginPath(); ctx.arc(-8,-12,8,Math.PI,0); ctx.arc(8,-12,8,Math.PI,0); ctx.fill();
    ctx.fillStyle='#1a1438'; ctx.beginPath(); ctx.arc(-4,-6,2,0,7); ctx.arc(4,-6,2,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.9)'; roundRect(-26,-44,30,18,8); ctx.fill();
    ctx.fillStyle='#1a1438'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center'; ctx.fillText('help!',-11,-31); ctx.restore(); }
  function drawPlayer(){ const p=player; if(p.inv>0 && Math.floor(anim/4)%2===0) return; ctx.save();
    ctx.translate(p.x+p.w/2,p.y+p.h/2); ctx.scale(p.face,1); const step=Math.sin(p.walk)*(p.onGround||p.climbing?3:0);
    ctx.fillStyle='#3a55c9'; roundRect(-9,6+step,7,10,3); ctx.fill(); roundRect(2,6-step,7,10,3); ctx.fill();
    ctx.fillStyle='#ff5e62'; roundRect(-10,-6,20,16,7); ctx.fill(); ctx.fillStyle='#ffe0c2'; ctx.beginPath(); ctx.arc(0,-14,9,0,7); ctx.fill();
    ctx.fillStyle='#ffd86b'; ctx.beginPath(); ctx.arc(0,-16,9,Math.PI,0); ctx.fill(); ctx.fillRect(0,-17,13,3);
    ctx.fillStyle='#1a1438'; ctx.beginPath(); ctx.arc(4,-13,2,0,7); ctx.fill(); ctx.strokeStyle='#1a1438'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(3,-10,3,0,Math.PI); ctx.stroke(); ctx.restore(); }
  function drawBarrels(){ for(const b of barrels){ ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.spin);
    ctx.fillStyle='#b5651d'; ctx.beginPath(); ctx.arc(0,0,b.r,0,7); ctx.fill(); ctx.fillStyle='#8a4a12'; roundRect(-b.r,-3,b.r*2,3,1); ctx.fill(); roundRect(-b.r,2,b.r*2,3,1); ctx.fill();
    ctx.strokeStyle='#5e3208'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-4,-b.r); ctx.lineTo(-4,b.r); ctx.moveTo(4,-b.r); ctx.lineTo(4,b.r); ctx.stroke(); ctx.restore(); } }

  const ov=$('overlay'), ovBig=ov.querySelector('.big'), ovH=ov.querySelector('h1'), ovP=ov.querySelector('p'), startBtn=$('startBtn'), hint=ov.querySelector('.hint');
  function showOverlay(e,t,x,b){ ov.style.display='flex'; ovBig.textContent=e; ovH.textContent=t; ovP.textContent=x; startBtn.textContent=b; hint.style.display='block'; }
  function hideOverlay(){ ov.style.display='none'; }
  startBtn.addEventListener('click', ()=>{ buzz(8);
    if(state==='menu'||state==='gameover'||state==='win') newGame();
    else if(state==='levelwin') startLevel();
    else if(state==='dead'){ resetPlayer(); state='play'; } hideOverlay(); });
  ov.addEventListener('touchstart', e=>{ if(e.target===ov) startBtn.click(); }, {passive:true});

  function render(){ if(state==='menu') return; drawBackground(); drawPlatforms(); drawLadders(); drawGorilla(); drawBarrels(); drawPlayer(); }
  function loop(){
    update(); render();
    if(state==='menu') showOverlay('🦍','Cute Kong','The cheeky gorilla trapped your friend at the top! Climb, dodge barrels and rescue them across 5 levels.','Tap to Play');
    else if(state==='dead') showOverlay('💥','Ouch!','A barrel got you. '+lives+' '+(lives===1?'life':'lives')+' left — try again!','Continue');
    else if(state==='levelwin') showOverlay('🎉','Level '+(level-1)+' Cleared!','Next: '+THEMES[level-1].name+'. The gorilla escapes higher up...','Next Level');
    else if(state==='gameover'){ showOverlay('😵','Game Over','You ran out of lives. Final score: '+score+'. Give it another go!','Play Again'); hint.style.display='none'; }
    else if(state==='win'){ showOverlay('🏆','You Win!','You beat all 5 levels and rescued your friend from Cute Kong! Score: '+score,'Play Again'); hint.style.display='none'; }
    else hideOverlay();
    requestAnimationFrame(loop);
  }

  makeIcon();
  theme=THEMES[0];
  showOverlay('🦍','Cute Kong','The cheeky gorilla trapped your friend at the top! Climb the ladders, dodge the rolling barrels and rescue them across 5 levels.','Tap to Play');
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
